<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꼬미 갤러리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Square+Round&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-beige: #FFF8E7;
            --point-yellow: #FCEB88;
            --text-dark: #2A2A2A;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-beige);
            color: var(--text-dark);
            font-family: 'Nanum Square Round', 'Malgun Gothic', sans-serif;
            padding-top: 100px;
            /* 네브바 공간 확보 */
        }

        h1,
        h2,
        h3 {
            font-family: 'Jua', sans-serif;
            font-weight: normal;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            z-index: 1000;
            /* 초기 상태는 투명 */
            background-color: transparent; 
            transition: background-color 0.3s ease, padding 0.3s ease, box-shadow 0.3s ease;
        }

        /* 스크롤 시 추가될 클래스 (자바스크립트에서 제어) */
        .navbar.scrolled {
            background-color: rgba(255, 255, 255, 0.95); /* 반투명한 흰색 */
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .navbar-nav {
            display: flex;
            list-style: none;
            gap: 40px; /* 메뉴 간격 */
        }

        .nav-item a {
            text-decoration: none;
            color: var(--text-dark);
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .nav-item a:hover {
            color: #F8DE54; /* 마우스 올렸을 때 노란색 */
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 12px;
            background-color: var(--point-yellow);
            z-index: -1;
            border-radius: 6px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }

        .gallery-item {
            aspect-ratio: 1;
            /* 완벽한 정사각형 유지 */
            border-radius: 16px;
            overflow: hidden;
            background-color: var(--card-bg);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            /* 마우스 오버 시 살짝 튀어나오는 효과 */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 이미지가 찌그러지지 않고 꽉 차게 */
            display: block;
        }

        @media (max-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .navbar-nav {
                gap: 20px;
            }
        }
    </style>
</head>

<body>
    <nav id="navbar" class="navbar">
        <ul class="navbar-nav">
            <li class="nav-item"><a href="i_am.html">Home</a></li>
            <li class="nav-item"><a href="gallery.html">갤러리</a></li>
            <li class="nav-item"><a href="#support">간식 후원</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2 class="section-title">꼬미 갤러리</h2>

        <div class="gallery-grid">
            <!-- 이미지 src 속성에 사진 경로를 채워주세요. (예: src="./img/photo1.jpg") -->
            <div class="gallery-item"><img src="assets/img1.png" alt="꼬미 사진"></div>
            <div class="gallery-item"><img src="assets/img2.png" alt="꼬미 사진"></div>
            <div class="gallery-item"><img src="assets/img3.png" alt="꼬미 사진"></div>
            <div class="gallery-item"><img src="assets/img4.png" alt="꼬미 사진"></div>

            <div class="gallery-item"><img src="assets/img5.png" alt="꼬미 사진"></div>
            <div class="gallery-item"><img src="assets/img6.png" alt="꼬미 사진"></div>
            <div class="gallery-item"><img src="assets/img7.png" alt="꼬미 사진"></div>
            <div class="gallery-item"><img src="assets/img8.png" alt="꼬미 사진"></div>
        </div>
    </main>
</body>

</html>
