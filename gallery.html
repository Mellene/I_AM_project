<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꼬미 갤러리</title>
    
    <!-- 구글 폰트 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Square+Round&display=swap" rel="stylesheet">

    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind 설정 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-beige': '#FFF8E7',
                        'point-yellow': '#FCEB88',
                        'point-yellow-hover': '#F8DE54',
                        'text-dark': '#2A2A2A',
                        'card-bg': '#FFFFFF',
                    },
                    fontFamily: {
                        'jua': ['Jua', 'sans-serif'],
                        'sans': ['Nanum Square Round', 'Malgun Gothic', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bg-beige text-text-dark font-sans pt-[100px] leading-relaxed">
    
    <!-- 네비게이션 바 -->
    <!-- 초기 투명 배경(bg-transparent), 스크롤 시 흰색 배경(bg-white/95) 적용됨 -->
    <nav id="navbar" class="fixed top-0 left-0 w-full flex justify-center py-5 z-50 bg-transparent transition-all duration-300 ease-in-out">
        <ul class="flex list-none gap-5 md:gap-10">
            <li><a href="index.html" class="no-underline text-text-dark font-jua text-[1.2rem] transition-colors duration-200 hover:text-point-yellow-hover">Home</a></li>
            <li><a href="gallery.html" class="no-underline font-jua text-[1.2rem] text-point-yellow-hover">갤러리</a></li>
            <li><a href="donation.html" class="no-underline text-text-dark font-jua text-[1.2rem] transition-colors duration-200 hover:text-point-yellow-hover">간식 후원</a></li>
        </ul>
    </nav>

    <!-- 메인 컨테이너 -->
    <main class="max-w-[1000px] mx-auto p-5">
        
        <!-- 갤러리 타이틀 -->
        <h2 class="relative inline-block left-1/2 -translate-x-1/2 text-center text-[2.2rem] mb-[40px] font-jua font-normal after:content-[''] after:absolute after:-bottom-[5px] after:left-0 after:w-full after:h-[12px] after:bg-point-yellow after:-z-10 after:rounded-md">
            꼬미 갤러리
        </h2>

        <!-- 갤러리 그리드 영역 -->
        <!-- 기본 2열(grid-cols-2), 모바일 이상(md: 768px 이상) 3열, 데스크톱(lg: 1024px 이상) 4열 -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-[10px] md:gap-[15px] lg:gap-[20px] mb-[60px]">
            
            <!-- 갤러리 아이템 (aspect-square로 완벽한 정사각형 비율 유지) -->
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <!-- 이미지 src 속성에 사진 경로를 채워주세요. (예: src="./img/photo1.jpg") -->
                <img src="assets/img1.png" alt="꼬미 사진 1" class="block w-full h-full object-cover">
            </div>
            
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <img src="assets/img2.png" alt="꼬미 사진 2" class="block w-full h-full object-cover">
            </div>
            
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <img src="assets/img3.png" alt="꼬미 사진 3" class="block w-full h-full object-cover">
            </div>
            
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <img src="assets/img4.png" alt="꼬미 사진 4" class="block w-full h-full object-cover">
            </div>
            
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <img src="assets/img5.png" alt="꼬미 사진 5" class="block w-full h-full object-cover">
            </div>
            
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <img src="assets/img6.png" alt="꼬미 사진 6" class="block w-full h-full object-cover">
            </div>
            
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <img src="assets/img7.png" alt="꼬미 사진 7" class="block w-full h-full object-cover">
            </div>
            
            <div class="aspect-square rounded-[16px] overflow-hidden bg-card-bg shadow-[0_4px_8px_rgba(0,0,0,0.05)] transition-transform duration-200 hover:scale-[1.03]">
                <img src="assets/img8.png" alt="꼬미 사진 8" class="block w-full h-full object-cover">
            </div>

        </div>
    </main>

    <!-- 스크롤 시 네비게이션 바 디자인 변경 로직 -->
    <script>
        window.addEventListener('scroll', function () {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                // 스크롤 시 반투명 흰색과 그림자 적용, 여백 감소
                navbar.classList.add('bg-white/95', 'py-[15px]', 'shadow-sm');
                navbar.classList.remove('bg-transparent', 'py-5');
            } else {
                // 맨 위로 올라갔을 때 원래 투명 상태로 복귀
                navbar.classList.add('bg-transparent', 'py-5');
                navbar.classList.remove('bg-white/95', 'py-[15px]', 'shadow-sm');
            }
        });
    </script>
</body>
</html>
