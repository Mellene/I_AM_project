<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM - 8살 블랙푸들 꼬미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Square+Round&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-beige': '#FFF8E7',
                        'point-yellow': '#FCEB88',
                        'point-yellow-hover': '#F8DE54',
                        'text-dark': '#2A2A2A',
                        'card-bg': '#FFFFFF',
                    },
                    fontFamily: {
                        'jua': ['Jua', 'sans-serif'],
                        'sans': ['Nanum Square Round', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg-beige text-text-dark font-sans pt-[60px] leading-relaxed overflow-x-hidden">
    
    <!-- 네비게이션 바 -->
    <nav id="navbar" class="fixed top-0 left-0 w-full flex justify-center py-5 z-50 transition-all duration-300 ease-in-out bg-transparent">
        <ul class="flex list-none gap-5 md:gap-10">
            <li><a href="index.html" class="font-jua text-[1.2rem] text-point-yellow-hover">Home</a></li>
            <li><a href="gallery.html" class="font-jua text-[1.2rem] hover:text-point-yellow-hover transition-colors">갤러리</a></li>
            <li><a href="sponsor.html" class="font-jua text-[1.2rem] hover:text-point-yellow-hover transition-colors">간식 후원</a></li>
        </ul>
    </nav>

    <!-- 히어로 섹션 -->
    <header class="text-center pt-[80px] px-5 pb-[60px] bg-gradient-to-b from-point-yellow to-bg-beige">
        <img src="assets/profile_ggomi.png" alt="꼬미 사진" class="w-[250px] h-[250px] rounded-full object-cover border-[6px] border-card-bg shadow-xl mx-auto mb-5" />
        <h1 class="text-[2.2rem] md:text-[2.8rem] mb-[15px] font-jua leading-tight">간식 앞엔 천재견, 산책은 V.I.P!<br>8살 블랙푸들 꼬미 🐾</h1>
        <p class="text-[1.2rem] text-[#555] mb-[30px]">내 옆에 착붙! 빙글빙글 까만 그림자 꼬미의 하루</p>
    </header>

    <main class="max-w-[900px] mx-auto py-10 px-5">
        
        <!-- 껌딱지 모먼트 -->
        <section class="mb-[80px]">
            <h2 class="text-center text-[2.2rem] mb-[40px] font-jua relative inline-block left-1/2 -translate-x-1/2">껌딱지 모먼트</h2>
            <div class="flex flex-col md:flex-row items-center bg-card-bg rounded-[24px] p-[30px] shadow-[0_8px_16px_rgba(0,0,0,0.05)] gap-[30px]">
                <div class="flex-1 rounded-[16px] overflow-hidden w-full h-[300px]">
                    <img src="assets/laydown_ggomi.png" alt="꼬미 누워있는 사진" class="w-full h-full object-cover" />
                </div>
                <div class="flex-[1.5]">
                    <h3 class="text-[1.8rem] mb-[15px] font-jua">"나의 최애 장소는 네 옆자리"</h3>
                    <p class="text-[1.1rem] text-[#444]">혼자 있는 건 절대 싫어! 안방마님 꼬미의 지정석은 언제나 사람 바로 옆입니다.</p>
                </div>
            </div>
        </section>

        <!-- 방명록 섹션 -->
        <section id="guestbook" class="bg-card-bg rounded-[24px] p-[40px] shadow-[0_8px_16px_rgba(0,0,0,0.05)] mb-[80px]">
            <h2 class="text-center text-[2.2rem] mb-[40px] font-jua relative inline-block left-1/2 -translate-x-1/2">🐾 꼬미에게 남기는 방명록</h2>
            
            <div class="flex flex-col gap-4 mb-8">
                <input id="guestName" type="text" placeholder="이름 (닉네임)" class="p-3 border-2 border-bg-beige rounded-xl focus:border-point-yellow outline-none font-sans">
                <textarea id="guestMessage" placeholder="꼬미에게 따뜻한 메시지를 남겨주세요!" class="p-3 border-2 border-bg-beige rounded-xl focus:border-point-yellow outline-none font-sans h-24"></textarea>
                <button onclick="addMessage()" class="bg-point-yellow py-3 rounded-full font-jua text-lg hover:bg-point-yellow-hover transition-all duration-300 transform hover:-translate-y-1">작성 완료 ✍️</button>
            </div>

            <div id="messageList" class="flex flex-col gap-4">
                <!-- 메시지가 여기에 렌더링됩니다 -->
            </div>
        </section>
    </main>

    <footer class="text-center py-[60px] px-5 bg-text-dark text-bg-beige">
        <span class="text-[2rem] mb-[10px] inline-block">🐾</span>
        <p class="text-[1.3rem] font-jua">오늘도 꼬미와 함께해주셔서 감사합니다!</p>
    </footer>

    <script>
        // 네비게이션 스크롤 효과
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('bg-white/95', 'py-[15px]', 'shadow-sm');
                navbar.classList.remove('bg-transparent', 'py-5');
            } else {
                navbar.classList.add('bg-transparent', 'py-5');
                navbar.classList.remove('bg-white/95', 'py-[15px]', 'shadow-sm');
            }
        });

        // 방명록 로직
        function addMessage() {
            const nameInput = document.getElementById('guestName');
            const messageInput = document.getElementById('guestMessage');
            
            if(!nameInput.value || !messageInput.value) {
                alert("이름과 메시지를 모두 입력해주세요!");
                return;
            }

            const newMessage = {
                name: nameInput.value,
                message: messageInput.value,
                date: new Date().toLocaleDateString()
            };

            const messages = JSON.parse(localStorage.getItem('kkomi_guestbook') || '[]');
            messages.unshift(newMessage); // 최신 글이 위로
            localStorage.setItem('kkomi_guestbook', JSON.stringify(messages));

            nameInput.value = '';
            messageInput.value = '';
            renderMessages();
        }

        function renderMessages() {
            const list = document.getElementById('messageList');
            const messages = JSON.parse(localStorage.getItem('kkomi_guestbook') || '[]');
            
            list.innerHTML = messages.map(msg => `
                <div class="bg-[#F9F9F9] p-4 rounded-xl border-l-4 border-point-yellow">
                    <div class="flex justify-between mb-2">
                        <strong class="font-jua">${msg.name}</strong>
                        <span class="text-sm text-gray-400">${msg.date}</span>
                    </div>
                    <p class="text-gray-700">${msg.message}</p>
                </div>
            `).join('');
        }

        // 페이지 로드 시 메시지 불러오기
        renderMessages();
    </script>
</body>
</html>
